<script>
    (() => {
        const toggle = document.querySelector('.site-header__menu-toggle');
        const navigation = document.getElementById('mobile-navigation');
        if (!toggle || !navigation) return;

        const closeButtons = navigation.querySelectorAll('[data-mobile-menu-close]');
        let lastFocusedElement = null;

        const setOpen = (open) => {
            if (open) {
                lastFocusedElement = document.activeElement;
            }
            toggle.setAttribute('aria-expanded', String(open));
            navigation.hidden = !open;
            document.body.classList.toggle('mobile-menu-open', open);
            if (open) {
                navigation.querySelector('.mobile-navigation__close')?.focus();
            } else if (lastFocusedElement) {
                lastFocusedElement.focus();
            }
        };

        toggle.addEventListener('click', () => setOpen(navigation.hidden));
        closeButtons.forEach((button) => button.addEventListener('click', () => setOpen(false)));
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && !navigation.hidden) {
                setOpen(false);
            }

            if (event.key === 'Tab' && !navigation.hidden) {
                const focusable = Array.from(navigation.querySelectorAll('a, button, select'))
                    .filter((element) => !element.disabled && element.offsetParent !== null);
                if (!focusable.length) return;
                const first = focusable[0];
                const last = focusable[focusable.length - 1];
                if (event.shiftKey && document.activeElement === first) {
                    event.preventDefault();
                    last.focus();
                } else if (!event.shiftKey && document.activeElement === last) {
                    event.preventDefault();
                    first.focus();
                }
            }
        });
        navigation.querySelectorAll('a').forEach((link) => link.addEventListener('click', () => setOpen(false)));
    })();
</script>

    <script>
        (() => {
            const input = document.querySelector('[data-taxonomy-filter]');
            const terms = Array.from(document.querySelectorAll('[data-taxonomy-term]'));
            const featured = document.querySelector('.taxonomy-index--featured');
            const visibleCount = document.querySelector('[data-taxonomy-visible-count]');
            if (!input || !terms.length) return;

            input.addEventListener('input', () => {
                const query = input.value.trim().toLocaleLowerCase();
                let visible = 0;
                terms.forEach((term) => {
                    const name = term.querySelector('.taxonomy-index__term-name')?.textContent.trim().toLocaleLowerCase() || '';
                    const matches = !query || name.includes(query);
                    term.hidden = !matches;
                    if (matches) visible += 1;
                });
                if (featured) featured.hidden = Boolean(query);
                if (visibleCount) visibleCount.textContent = String(visible);
            });
        })();
    </script>

<script>
(() => {
    const button = document.querySelector('[data-back-to-top]');
    if (!button) return;

    const visibilityThreshold = 320;
    let ticking = false;

    const updateVisibility = () => {
        button.hidden = window.scrollY < visibilityThreshold;
        ticking = false;
    };

    window.addEventListener('scroll', () => {
        if (!ticking) {
            window.requestAnimationFrame(updateVisibility);
            ticking = true;
        }
    }, { passive: true });

    button.addEventListener('click', () => {
        const behavior = window.matchMedia('(prefers-reduced-motion: reduce)').matches
            ? 'auto'
            : 'smooth';
        window.scrollTo({ top: 0, behavior });
    });

    updateVisibility();
})();
</script>
