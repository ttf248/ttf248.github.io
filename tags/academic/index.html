    <script>
        (() => {
            const input = document.querySelector('[data-taxonomy-filter]');
            const terms = Array.from(document.querySelectorAll('[data-taxonomy-term]'));
            const featured = document.querySelector('.taxonomy-index--featured');
            const visibleCount = document.querySelector('[data-taxonomy-visible-count]');
            if (!input || !terms.length) return;

            input.addEventListener('input', () => {
                const query = input.value.trim().toLocaleLowerCase();
                let visible = 0;
                terms.forEach((term) => {
                    const name = term.querySelector('.taxonomy-index__term-name')?.textContent.trim().toLocaleLowerCase() || '';
                    const matches = !query || name.includes(query);
                    term.hidden = !matches;
                    if (matches) visible += 1;
                });
                if (featured) featured.hidden = Boolean(query);
                if (visibleCount) visibleCount.textContent = String(visible);
            });
        })();
    </script>
